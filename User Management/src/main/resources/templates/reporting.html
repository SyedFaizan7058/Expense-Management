<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Expense Report</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/addExpense">Add Expense</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Reporting Overview</h2>

    <!-- Admin Overview -->
    <div th:if="${totalUsers != null}" class="card mb-4">
        <div class="card-body">
            <h4>Admin Overview</h4>
            <div class="row">
                <div class="col-md-4">
                    <p class="mb-1"><strong>Total Users:</strong></p>
                    <p class="text-primary fs-4" th:text="${totalUsers}"></p>
                </div>

                <div class="col-md-4">
                    <p class="mb-1"><strong>Total Expense (Current Month):</strong></p>
                    <a class="text-decoration-none fs-4 text-info"
                       th:href="@{/monthly-expenses}"
                       th:text="${totalExpenseCurrentMonth}">
                    </a>
                </div>

                <div class="col-md-4">
                    <p class="mb-1"><strong>Average Expense per User (Current Month):</strong></p>
                    <p class="text-success fs-4" th:text="${averageExpense}"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- User Overview (for Non-Admin) -->
    <div th:if="${userTotalExpense != null}" class="card mb-4">
        <div class="card-body">
            <h4>User Overview</h4>
            <div class="row text">
                <div class="col-md-6">
                    <p class="mb-1"><strong>Total Expense (Current Month):</strong></p>
                    <a class="text-decoration-none fs-4 text-info"
                       th:href="@{/monthly-expenses}"
                       th:text="${userTotalExpense}">
                    </a>
                </div>

                <div class="col-md-6">
                    <p class="mb-1"><strong>Average Expense (Current Month):</strong></p>
                    <p class="text-success fs-4" th:text="${userTotalExpense != null ? userTotalExpense : 0}"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
